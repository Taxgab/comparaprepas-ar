name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.issue.number || github.event.pull_request.number }}
          fetch-depth: 0

      - uses: opencode-ai/opencode-github-action/main@main
        with:
          model: opencode/zen
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
